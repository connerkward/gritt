<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gritt — Color Texture Picker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0e0e0e; color:#ddd; overflow:hidden; height:100dvh; }

.app { display:flex; flex-direction:column; height:100dvh; }

.header { padding:10px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; border-bottom:1px solid #222; }
.header h1 { font-family:"Space Mono",monospace; font-size:18px; font-weight:700; letter-spacing:1.5px; text-transform:lowercase; }
.header h1 span { font-family:"DM Sans",sans-serif; color:#888; font-weight:400; font-size:13px; margin-left:6px; letter-spacing:0; text-transform:none; }
.upload-btn { background:#1a1a1a; border:1px solid #333; color:#aaa; padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; }
.upload-btn:active { background:#333; }

.main { flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden; }

/* Desktop: side by side */
@media (min-width:700px) {
  .main { flex-direction:row; }
  .canvas-area { flex:1; min-width:0; }
  .sidebar { width:280px; flex-shrink:0; }
}

/* Mobile: stacked */
@media (max-width:699px) {
  .canvas-area { height:50%; flex-shrink:0; }
  .sidebar { flex:1; min-height:0; }
}

.canvas-area { position:relative; background:#111; overflow:hidden; cursor:crosshair; }
.canvas-area canvas { display:block; width:100%; height:100%; object-fit:contain; touch-action:none; }
.select-rect { position:absolute; border:2px solid rgba(255,255,255,0.7); background:rgba(255,255,255,0.08); pointer-events:none; border-radius:2px; }

.sidebar { display:flex; flex-direction:column; gap:6px; overflow-y:auto; padding:10px 12px; border-top:1px solid #222; }
@media (min-width:700px) {
  .sidebar { border-top:none; border-left:1px solid #222; }
}

h3 { font-family:"Space Mono",monospace; font-size:10px; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

.controls { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.controls label { font-size:11px; color:#666; }
.controls input[type=range] { width:70px; accent-color:#0078d6; }
.num-display { font-size:11px; color:#999; min-width:14px; }

.palette { display:flex; gap:3px; flex-wrap:wrap; }
.swatch { width:40px; height:40px; border-radius:8px; cursor:pointer; transition:transform 0.1s, opacity 0.15s; border:2px solid transparent; position:relative; }
.swatch:active { transform:scale(0.9); }
.swatch.enabled { border-color:rgba(255,255,255,0.25); }
.swatch.disabled { opacity:0.3; border-color:transparent; }
.swatch.disabled::after { content:""; position:absolute; inset:0; border-radius:6px; background:repeating-linear-gradient(135deg,transparent,transparent 3px,rgba(0,0,0,0.4) 3px,rgba(0,0,0,0.4) 5px); }

.info-row { display:flex; gap:2px; flex-wrap:wrap; }
.info-cell { width:40px; text-align:center; }
.swatch-hex { font-size:8px; color:#888; transition:opacity 0.15s; }
.swatch-pct { font-size:8px; color:#555; transition:opacity 0.15s; }
.info-cell.disabled .swatch-hex, .info-cell.disabled .swatch-pct { opacity:0.3; text-decoration:line-through; }

.texture-preview { width:100%; height:100px; border-radius:8px; border:1px solid #2a2a2a; overflow:hidden; }
.texture-preview canvas { width:100%; height:100%; display:block; }

.css-previews { display:flex; gap:4px; }
.css-prev { flex:1; height:44px; border-radius:6px; border:1px solid #2a2a2a; cursor:pointer; }
.css-prev:active { border-color:#555; }
.css-prev-label { font-size:8px; color:#555; text-align:center; margin-top:1px; }

.css-block { background:#151515; border:1px solid #2a2a2a; border-radius:6px; padding:6px 8px; font:10px/1.4 "Space Mono","SF Mono",ui-monospace,monospace; color:#aaa; white-space:pre-wrap; word-break:break-all; cursor:pointer; max-height:40px; overflow:hidden; }
.css-block:active { border-color:#555; color:#ccc; }

.empty-msg { color:#555; font-size:14px; text-align:center; padding:30px 12px; line-height:1.5; }

.copied { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:6px 14px; border-radius:6px; font-size:12px; opacity:0; transition:opacity 0.2s; pointer-events:none; z-index:99; }
.copied.show { opacity:1; }

.drop-overlay { position:absolute; inset:0; background:rgba(0,120,214,0.15); border:3px dashed #0078d6; display:none; align-items:center; justify-content:center; z-index:10; pointer-events:none; }
.drop-overlay.active { display:flex; }
.drop-overlay span { background:#0078d6; color:#fff; padding:8px 20px; border-radius:8px; font-size:14px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Gritt <span>color texture picker</span></h1>
    <label class="upload-btn">
      Upload Image
      <input type="file" accept="image/*" id="fileInput" style="display:none">
    </label>
  </div>
  <div class="main">
    <div class="canvas-area" id="canvasArea">
      <canvas id="canvas"></canvas>
      <div class="select-rect" id="selectRect" style="display:none"></div>
      <div class="drop-overlay" id="dropOverlay"><span>Drop image here</span></div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
  <div class="copied" id="copiedToast">Copied!</div>
</div>

<script>
// --- Color math ---
function rgbToHex(r,g,b){return"#"+[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("")}
function rgbToHsl(r,g,b){const rn=r/255,gn=g/255,bn=b/255,mx=Math.max(rn,gn,bn),mn=Math.min(rn,gn,bn),l=(mx+mn)/2;if(mx===mn)return{h:0,s:0,l:Math.round(l*100)};const d=mx-mn,s=l>.5?d/(2-mx-mn):d/(mx+mn);let h=0;if(mx===rn)h=((gn-bn)/d+(gn<bn?6:0))/6;else if(mx===gn)h=((bn-rn)/d+2)/6;else h=((rn-gn)/d+4)/6;return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}}

function kMeans(data,sx,sy,w,h,cw,k){const step=Math.max(1,Math.floor(Math.sqrt(w*h/800)));const rs=[],gs=[],bs=[];for(let r=0;r<h;r+=step)for(let c=0;c<w;c+=step){const i=((sy+r)*cw+(sx+c))*4;rs.push(data[i]);gs.push(data[i+1]);bs.push(data[i+2])}const n=rs.length;if(!n)return[];k=Math.min(k,n);const cs=Math.floor(n/k),cr=new Float64Array(k),cg=new Float64Array(k),cb=new Float64Array(k);for(let i=0;i<k;i++){cr[i]=rs[i*cs];cg[i]=gs[i*cs];cb[i]=bs[i*cs]}const a=new Int32Array(n);for(let it=0;it<8;it++){let ch=false;for(let i=0;i<n;i++){let b=0,bd=1/0;for(let j=0;j<k;j++){const d=(rs[i]-cr[j])**2+(gs[i]-cg[j])**2+(bs[i]-cb[j])**2;if(d<bd){bd=d;b=j}}if(a[i]!==b){a[i]=b;ch=true}}if(!ch)break;const sr=new Float64Array(k),sg=new Float64Array(k),sb=new Float64Array(k),cnt=new Float64Array(k);for(let i=0;i<n;i++){const c=a[i];sr[c]+=rs[i];sg[c]+=gs[i];sb[c]+=bs[i];cnt[c]++}for(let j=0;j<k;j++)if(cnt[j]>0){cr[j]=sr[j]/cnt[j];cg[j]=sg[j]/cnt[j];cb[j]=sb[j]/cnt[j]}}const cnt2=new Float64Array(k);for(let i=0;i<n;i++)cnt2[a[i]]++;return Array.from({length:k},(_,i)=>{const r=Math.round(cr[i]),g=Math.round(cg[i]),b=Math.round(cb[i]);return{r,g,b,hex:rgbToHex(r,g,b),hsl:rgbToHsl(r,g,b),weight:cnt2[i]/n}}).filter(c=>c.weight>0).sort((a,b)=>b.weight-a.weight)}

function generateCss(colors){const gradient=`linear-gradient(135deg, ${colors.map((c,i)=>`${c.hex} ${Math.round(i/Math.max(colors.length-1,1)*100)}%`).join(", ")})`;const noise=colors.map((c,i)=>{const x=20+(i*37)%60,y=20+(i*53)%60;return`radial-gradient(ellipse at ${x}% ${y}%, ${c.hex}88 0%, transparent 60%)`}).join(", ");const mesh=colors.map((c,i)=>`linear-gradient(${i*360/colors.length}deg, ${c.hex}cc 0%, transparent 70%)`).join(", ");return{gradient,noise,mesh}}

function drawTexturePreview(cvs,palette){const W=cvs.width,H=cvs.height,ctx=cvs.getContext("2d");ctx.fillStyle=palette[0].hex;ctx.fillRect(0,0,W,H);for(let pass=0;pass<3;pass++)for(let i=0;i<palette.length;i++){const c=palette[i],count=Math.max(2,Math.round(c.weight*12));for(let j=0;j<count;j++){const seed=i*97+j*31+pass*53,x=(seed*7+j*137)%W,y=(seed*13+j*89+pass*43)%H,r=20+seed%40+pass*15,grad=ctx.createRadialGradient(x,y,0,x,y,r);grad.addColorStop(0,`rgba(${c.r},${c.g},${c.b},${.3+pass*.1})`);grad.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);ctx.fillStyle=grad;ctx.fillRect(x-r,y-r,r*2,r*2)}}const id=ctx.getImageData(0,0,W,H),d=id.data;for(let i=0;i<d.length;i+=4){const n=(Math.random()-.5)*16;d[i]=Math.max(0,Math.min(255,d[i]+n));d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));d[i+2]=Math.max(0,Math.min(255,d[i+2]+n))}ctx.putImageData(id,0,0)}

// --- App state ---
const canvas=document.getElementById("canvas");
const canvasArea=document.getElementById("canvasArea");
const selectRect=document.getElementById("selectRect");
const sidebar=document.getElementById("sidebar");
const copiedToast=document.getElementById("copiedToast");
const dropOverlay=document.getElementById("dropOverlay");
let fullImageData=null, numColors=6, regionSize=40;
let toastTimer, lastPalette=null, disabledSet=new Set();

function showCopied(t){copiedToast.textContent=`Copied: ${t}`;copiedToast.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>copiedToast.classList.remove("show"),1200)}

function loadImageFromFile(file){const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{const max=1200;let w=img.naturalWidth,h=img.naturalHeight;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}canvas.width=w;canvas.height=h;const ctx=canvas.getContext("2d",{willReadFrequently:true});ctx.drawImage(img,0,0,w,h);fullImageData=ctx.getImageData(0,0,w,h);showEmptyMsg("Tap or drag on the image to pick a color texture")};img.src=reader.result};reader.readAsDataURL(file)}

document.getElementById("fileInput").addEventListener("change",e=>{if(e.target.files[0])loadImageFromFile(e.target.files[0])});

// Drag and drop
canvasArea.addEventListener("dragover",e=>{e.preventDefault();dropOverlay.classList.add("active")});
canvasArea.addEventListener("dragleave",()=>dropOverlay.classList.remove("active"));
canvasArea.addEventListener("drop",e=>{e.preventDefault();dropOverlay.classList.remove("active");if(e.dataTransfer.files[0])loadImageFromFile(e.dataTransfer.files[0])});

function showEmptyMsg(msg){sidebar.replaceChildren();sidebar.appendChild(buildControls());const m=document.createElement("div");m.className="empty-msg";m.textContent=msg;sidebar.appendChild(m)}

function buildControls(){const c=document.createElement("div");c.className="controls";const l1=document.createElement("label");l1.textContent="Colors:";const n1=document.createElement("span");n1.className="num-display";n1.textContent=numColors;const s1=document.createElement("input");s1.type="range";s1.min="2";s1.max="12";s1.value=numColors;s1.addEventListener("input",()=>{numColors=+s1.value;n1.textContent=s1.value});const l2=document.createElement("label");l2.textContent="Radius:";const n2=document.createElement("span");n2.className="num-display";n2.textContent=regionSize;const s2=document.createElement("input");s2.type="range";s2.min="10";s2.max="150";s2.value=regionSize;s2.addEventListener("input",()=>{regionSize=+s2.value;n2.textContent=s2.value});c.append(l1,s1,n1,l2,s2,n2);return c}

function getCoords(clientX,clientY){const rect=canvas.getBoundingClientRect(),ia=canvas.width/canvas.height,ba=rect.width/rect.height;let dw,dh,ox,oy;if(ia>ba){dw=rect.width;dh=rect.width/ia;ox=0;oy=(rect.height-dh)/2}else{dh=rect.height;dw=rect.height*ia;ox=(rect.width-dw)/2;oy=0}return[Math.round((clientX-rect.left-ox)/dw*canvas.width),Math.round((clientY-rect.top-oy)/dh*canvas.height)]}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

let rafId=0;
function analyzeAt(cx,cy){if(!fullImageData)return;cx=clamp(cx,0,fullImageData.width-1);cy=clamp(cy,0,fullImageData.height-1);cancelAnimationFrame(rafId);rafId=requestAnimationFrame(()=>{if(!fullImageData)return;const iw=fullImageData.width,ih=fullImageData.height;const x0=clamp(cx-regionSize,0,iw-1),y0=clamp(cy-regionSize,0,ih-1),x1=clamp(cx+regionSize,0,iw),y1=clamp(cy+regionSize,0,ih),w=x1-x0,h=y1-y0;if(w<1||h<1)return;const cr=canvas.getBoundingClientRect(),ia=canvas.width/canvas.height,ba=cr.width/cr.height;let dw,dh,ox,oy;if(ia>ba){dw=cr.width;dh=cr.width/ia;ox=0;oy=(cr.height-dh)/2}else{dh=cr.height;dw=cr.height*ia;ox=(cr.width-dw)/2;oy=0}const sx=dw/iw,sy=dh/ih;selectRect.style.display="block";selectRect.style.left=`${ox+x0*sx}px`;selectRect.style.top=`${oy+y0*sy}px`;selectRect.style.width=`${w*sx}px`;selectRect.style.height=`${h*sy}px`;const palette=kMeans(fullImageData.data,x0,y0,w,h,iw,numColors);if(!palette.length)return;renderSidebar(palette)})}

function getEnabledPalette(){if(!lastPalette)return[];return lastPalette.filter((_,i)=>!disabledSet.has(i))}

function updateOutputs(){const enabled=getEnabledPalette();if(!enabled.length)return;const css=generateCss(enabled);
const tc=sidebar.querySelector(".texture-preview canvas");if(tc)drawTexturePreview(tc,enabled);
const prevs=sidebar.querySelectorAll(".css-prev");const bgs=[css.gradient,css.noise,`${css.mesh}, ${enabled[0].hex}`];prevs.forEach((pv,i)=>{if(bgs[i])pv.style.background=bgs[i]});
const blocks=sidebar.querySelectorAll(".css-block");const vals=[["gradient",css.gradient],["noise",css.noise],["mesh",`${css.mesh}, ${enabled[0].hex}`]];blocks.forEach((b,i)=>{if(!vals[i])return;b.textContent=`/* ${vals[i][0]} */\nbackground: ${vals[i][1]};`;b.onclick=()=>{navigator.clipboard.writeText(`background: ${vals[i][1]};`);showCopied(vals[i][0])}});
const pl=sidebar.querySelector(".palette-label");if(pl)pl.textContent=`Palette (${enabled.length}/${lastPalette.length})`}

function renderSidebar(palette){lastPalette=palette;disabledSet=new Set();const enabled=getEnabledPalette();const css=generateCss(enabled);
sidebar.replaceChildren();sidebar.appendChild(buildControls());
const tl=document.createElement("h3");tl.textContent="Texture Preview";sidebar.appendChild(tl);
const tw=document.createElement("div");tw.className="texture-preview";const tc=document.createElement("canvas");tc.width=280;tc.height=100;tw.appendChild(tc);sidebar.appendChild(tw);drawTexturePreview(tc,enabled);
const pl=document.createElement("h3");pl.className="palette-label";pl.textContent=`Palette (${enabled.length}/${palette.length})`;sidebar.appendChild(pl);
const pr=document.createElement("div");pr.className="palette";palette.forEach((c,idx)=>{const s=document.createElement("div");s.className="swatch enabled";s.style.background=c.hex;s.title=`Click to toggle\nRight-click to copy\n${c.hex} · HSL(${c.hsl.h},${c.hsl.s}%,${c.hsl.l}%) · ${Math.round(c.weight*100)}%`;s.addEventListener("click",()=>{if(disabledSet.has(idx)){disabledSet.delete(idx);s.classList.remove("disabled");s.classList.add("enabled")}else{if(getEnabledPalette().length<=1)return;disabledSet.add(idx);s.classList.remove("enabled");s.classList.add("disabled")}const ic=sidebar.querySelectorAll(".info-cell")[idx];if(ic)ic.classList.toggle("disabled",disabledSet.has(idx));updateOutputs()});s.addEventListener("contextmenu",e=>{e.preventDefault();navigator.clipboard.writeText(c.hex);showCopied(c.hex)});pr.appendChild(s)});sidebar.appendChild(pr);
const ir=document.createElement("div");ir.className="info-row";palette.forEach((c)=>{const d=document.createElement("div");d.className="info-cell";const h=document.createElement("div");h.className="swatch-hex";h.textContent=c.hex;const p=document.createElement("div");p.className="swatch-pct";p.textContent=Math.round(c.weight*100)+"%";d.append(h,p);ir.appendChild(d)});sidebar.appendChild(ir);
const cl=document.createElement("h3");cl.textContent="CSS Patterns";sidebar.appendChild(cl);
const pvr=document.createElement("div");pvr.className="css-previews";
[["Gradient",css.gradient],["Noise",css.noise],["Mesh",`${css.mesh}, ${enabled[0].hex}`]].forEach(([label,bg])=>{const col=document.createElement("div");col.style.flex="1";const pv=document.createElement("div");pv.className="css-prev";pv.style.background=bg;pv.addEventListener("click",()=>{const en=getEnabledPalette();const cs=generateCss(en);const vals={Gradient:cs.gradient,Noise:cs.noise,Mesh:`${cs.mesh}, ${en[0].hex}`};navigator.clipboard.writeText(`background: ${vals[label]};`);showCopied(label)});const lb=document.createElement("div");lb.className="css-prev-label";lb.textContent=label;col.append(pv,lb);pvr.appendChild(col)});sidebar.appendChild(pvr);
const cdl=document.createElement("h3");cdl.textContent="CSS (tap to copy)";sidebar.appendChild(cdl);
[["gradient",css.gradient],["noise",css.noise],["mesh",`${css.mesh}, ${enabled[0].hex}`]].forEach(([label,value])=>{const b=document.createElement("div");b.className="css-block";b.textContent=`/* ${label} */\nbackground: ${value};`;b.addEventListener("click",()=>{navigator.clipboard.writeText(`background: ${value};`);showCopied(label)});sidebar.appendChild(b)})}

// Mouse events
let isDown=false;
canvasArea.addEventListener("mousedown",e=>{isDown=true;const[cx,cy]=getCoords(e.clientX,e.clientY);analyzeAt(cx,cy)});
canvasArea.addEventListener("mousemove",e=>{if(!isDown)return;const[cx,cy]=getCoords(e.clientX,e.clientY);analyzeAt(cx,cy)});
window.addEventListener("mouseup",()=>isDown=false);

// Touch events for mobile
canvasArea.addEventListener("touchstart",e=>{e.preventDefault();isDown=true;const t=e.touches[0];const[cx,cy]=getCoords(t.clientX,t.clientY);analyzeAt(cx,cy)},{passive:false});
canvasArea.addEventListener("touchmove",e=>{e.preventDefault();if(!isDown)return;const t=e.touches[0];const[cx,cy]=getCoords(t.clientX,t.clientY);analyzeAt(cx,cy)},{passive:false});
window.addEventListener("touchend",()=>isDown=false);

// Init
